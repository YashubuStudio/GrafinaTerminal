server:
  port: 8080
  interval: 3s    # Prometheusポーリング間隔
  burn_in:
    enabled: true
    pixel_shift_interval: 45s
    pixel_shift_step: 2
    idle_dim_after: 90s
    idle_brightness: 0.65

prometheus:
  url: http://localhost:9090
  job: node        # node_exporterのジョブ名

# デバイス設定（任意）
# priority は 0-255。数値が大きいほど優先度が高い
devices:
  "192.168.1.10:9100":
    name: raspi-living
    priority: 220
  "192.168.1.11:9100":
    name: raspi-kitchen
    priority: 180
  "192.168.1.12:9100":
    name: raspi-garage
    priority: 120
